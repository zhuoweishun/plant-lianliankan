<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 200" width="48" height="200">
  <!-- vertical picket fence tile (repeat-y) -->
  <defs>
    <linearGradient id="woodShadowV" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#eae6d8" stop-opacity="0.95"/>
    </linearGradient>
    <filter id="softV" x="-50%" y="-20%" width="200%" height="140%">
      <feDropShadow dx="2" dy="0" stdDeviation="2" flood-color="#000000" flood-opacity="0.18"/>
    </filter>
  </defs>

  <g filter="url(#softV)">
    <!-- rail -->
    <rect x="30" y="0" width="10" height="200" rx="5" fill="url(#woodShadowV)" opacity="0.98"/>
    <rect x="38" y="0" width="6" height="200" rx="3" fill="#dcd6c7" opacity="0.85"/>

    <!-- pickets -->
    <g fill="url(#woodShadowV)" opacity="0.98" stroke="#d8d2c4" stroke-width="1">
      <rect x="6" y="4"   width="30" height="14" rx="6"/>
      <rect x="6" y="24"  width="30" height="14" rx="6"/>
      <rect x="6" y="44"  width="30" height="14" rx="6"/>
      <rect x="6" y="64"  width="30" height="14" rx="6"/>
      <rect x="6" y="84"  width="30" height="14" rx="6"/>
      <rect x="6" y="104" width="30" height="14" rx="6"/>
      <rect x="6" y="124" width="30" height="14" rx="6"/>
      <rect x="6" y="144" width="30" height="14" rx="6"/>
      <rect x="6" y="164" width="30" height="14" rx="6"/>
      <rect x="6" y="184" width="30" height="14" rx="6"/>
    </g>

    <!-- subtle highlights -->
    <g opacity="0.10" fill="#ffffff">
      <rect x="8" y="6"   width="26" height="3" rx="2"/>
      <rect x="8" y="26"  width="26" height="3" rx="2"/>
      <rect x="8" y="46"  width="26" height="3" rx="2"/>
      <rect x="8" y="66"  width="26" height="3" rx="2"/>
      <rect x="8" y="86"  width="26" height="3" rx="2"/>
      <rect x="8" y="106" width="26" height="3" rx="2"/>
      <rect x="8" y="126" width="26" height="3" rx="2"/>
      <rect x="8" y="146" width="26" height="3" rx="2"/>
      <rect x="8" y="166" width="26" height="3" rx="2"/>
      <rect x="8" y="186" width="26" height="3" rx="2"/>
    </g>
  </g>
</svg>

