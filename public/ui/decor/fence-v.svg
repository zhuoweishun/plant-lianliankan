<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 200" width="48" height="200">
  <!-- vertical fence side (stretched to 100% height; no visible tiling seams) -->
  <defs>
    <linearGradient id="paint" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#eae6d8" stop-opacity="0.95"/>
    </linearGradient>
    <filter id="softV" x="-60%" y="-20%" width="220%" height="140%">
      <feDropShadow dx="2" dy="0" stdDeviation="2" flood-color="#000000" flood-opacity="0.18"/>
    </filter>
  </defs>

  <g filter="url(#softV)">
    <!-- rails -->
    <rect x="8" y="18" width="32" height="10" rx="5" fill="#dcd6c7" opacity="0.85"/>
    <rect x="8" y="170" width="32" height="10" rx="5" fill="#dcd6c7" opacity="0.85"/>

    <!-- pickets (vertical) -->
    <g fill="url(#paint)" opacity="0.98" stroke="#d8d2c4" stroke-width="1">
      <rect x="4"  y="6" width="12" height="188" rx="6"/>
      <rect x="18" y="6" width="12" height="188" rx="6"/>
      <rect x="32" y="6" width="12" height="188" rx="6"/>
    </g>

    <!-- subtle highlights -->
    <g opacity="0.10" fill="#ffffff">
      <rect x="6"  y="10" width="3" height="182" rx="2"/>
      <rect x="20" y="10" width="3" height="182" rx="2"/>
      <rect x="34" y="10" width="3" height="182" rx="2"/>
    </g>
  </g>
</svg>
