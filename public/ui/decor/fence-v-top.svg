<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 200" width="48" height="200">
  <!--
    Side fence in TOP-DOWN language:
    - a long painted rail (top surface)
    - repeated small rounded "picket tops" as subtle bumps
    Intended to be stretched to 100% height (no-repeat).
  -->
  <defs>
    <linearGradient id="rail" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.96"/>
      <stop offset="0.55" stop-color="#f2efe5" stop-opacity="0.96"/>
      <stop offset="1" stop-color="#e7e1d3" stop-opacity="0.96"/>
    </linearGradient>
    <filter id="soft" x="-60%" y="-20%" width="220%" height="140%">
      <feDropShadow dx="2" dy="0" stdDeviation="2" flood-color="#000000" flood-opacity="0.16"/>
    </filter>
  </defs>

  <g filter="url(#soft)">
    <!-- main rail (top surface) -->
    <rect x="10" y="6" width="28" height="188" rx="14" fill="url(#rail)"/>
    <!-- inner shading to give thickness -->
    <rect x="13" y="10" width="22" height="180" rx="11" fill="#ffffff" opacity="0.20"/>
    <rect x="14" y="12" width="20" height="176" rx="10" fill="#000000" opacity="0.05"/>

    <!-- subtle picket-top bumps along the rail -->
    <g fill="#ffffff" opacity="0.38">
      <circle cx="24" cy="28" r="3.2"/>
      <circle cx="24" cy="52" r="3.2"/>
      <circle cx="24" cy="76" r="3.2"/>
      <circle cx="24" cy="100" r="3.2"/>
      <circle cx="24" cy="124" r="3.2"/>
      <circle cx="24" cy="148" r="3.2"/>
      <circle cx="24" cy="172" r="3.2"/>
    </g>

    <!-- edge line -->
    <rect x="10.5" y="6.5" width="27" height="187" rx="13.5" fill="none" stroke="#d8d2c4" stroke-width="1" opacity="0.85"/>
  </g>
</svg>

