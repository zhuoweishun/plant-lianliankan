<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 48" width="200" height="48">
  <!-- horizontal picket fence tile (repeat-x) -->
  <defs>
    <linearGradient id="woodShadow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#eae6d8" stop-opacity="0.95"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-50%" width="140%" height="200%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000000" flood-opacity="0.18"/>
    </filter>
  </defs>

  <g filter="url(#soft)">
    <!-- rail -->
    <rect x="0" y="30" width="200" height="10" rx="5" fill="url(#woodShadow)" opacity="0.98"/>
    <rect x="0" y="38" width="200" height="6" rx="3" fill="#dcd6c7" opacity="0.85"/>

    <!-- pickets -->
    <g fill="url(#woodShadow)" opacity="0.98" stroke="#d8d2c4" stroke-width="1">
      <!-- 10 pickets, each 16px wide with 4px gap -->
      <rect x="4"  y="6" width="14" height="30" rx="6"/>
      <rect x="24" y="6" width="14" height="30" rx="6"/>
      <rect x="44" y="6" width="14" height="30" rx="6"/>
      <rect x="64" y="6" width="14" height="30" rx="6"/>
      <rect x="84" y="6" width="14" height="30" rx="6"/>
      <rect x="104" y="6" width="14" height="30" rx="6"/>
      <rect x="124" y="6" width="14" height="30" rx="6"/>
      <rect x="144" y="6" width="14" height="30" rx="6"/>
      <rect x="164" y="6" width="14" height="30" rx="6"/>
      <rect x="184" y="6" width="14" height="30" rx="6"/>
    </g>

    <!-- subtle highlights -->
    <g opacity="0.10" fill="#ffffff">
      <rect x="6"  y="8" width="3" height="26" rx="2"/>
      <rect x="26" y="8" width="3" height="26" rx="2"/>
      <rect x="46" y="8" width="3" height="26" rx="2"/>
      <rect x="66" y="8" width="3" height="26" rx="2"/>
      <rect x="86" y="8" width="3" height="26" rx="2"/>
      <rect x="106" y="8" width="3" height="26" rx="2"/>
      <rect x="126" y="8" width="3" height="26" rx="2"/>
      <rect x="146" y="8" width="3" height="26" rx="2"/>
      <rect x="166" y="8" width="3" height="26" rx="2"/>
      <rect x="186" y="8" width="3" height="26" rx="2"/>
    </g>
  </g>
</svg>

